<!DOCTYPE html>
<html>

<head lang="en">
    <title>Mouse Battery Settings</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
</head>

<body>
    <sdpi-item label="Device">
        <sdpi-select setting="device" default="corsair">
            <option value="corsair">Corsair Wireless Mouse</option>
            <option value="logitech">Logitech G502 Lightspeed</option>
        </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Title Position">
        <sdpi-select setting="titlePosition" default="top">
            <option value="top">Top</option>
            <option value="bottom">Bottom</option>
        </sdpi-select>
    </sdpi-item>
</body>

</html>
